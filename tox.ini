[tox]
minversion = 3.10.0
envlist = pypy3, python3.10, python3.11, python3.12, python3.13, python3.14, ruff, ty
isolated_build = True

[gh-actions]
python =
    pypy-3.11: pypy3
    3.10: python3.10, ruff, ty
    3.11: python3.11
    3.12: python3.12
    3.13: python3.13
    3.14: python3.14


[testenv]
deps =
    pytest
    pytest-xdist
commands = pytest bgpy --basetemp={envtmpdir}

[testenv:ty]
basepython = python3.10
deps = -r {toxinidir}/requirements_dev.txt
commands = ty check bgpy

[testenv:ruff]
basepython = python3.10
deps = ruff
commands =
    ruff check bgpy
    ruff format bgpy
